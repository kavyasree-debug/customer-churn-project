<!DOCTYPE html>
<html>
<head>
    <title>Employee Sign Up</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>body { background: #141414; color: white; display: flex; align-items: center; height: 100vh; }</style>
</head>
<body>
    <div class="container text-center" style="max-width: 400px; background: rgba(0,0,0,0.8); padding: 40px; border-radius: 10px;">
        <h2>Join the Team</h2>
        <p>Create your Unique Employee ID</p>
        <form action="/signup" method="post">
            <input type="text" name="username" class="form-control mb-3" placeholder="Enter Unique ID" required>
            <input type="password" name="password" class="form-control mb-3" placeholder="Create Password" required>
            <button type="submit" class="btn btn-danger w-100">Register</button>
        </form>
        <br>
        <a href="/" style="color: gray;">Already have an account? Login here</a>
    </div>
</body>
</html>
