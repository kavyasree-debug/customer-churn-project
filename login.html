<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Employee Login | Netflix Churn System</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { 
            background: linear-gradient(rgba(0,0,0,0.7), rgba(0,0,0,0.7)), 
                        url('https://assets.nflxext.com/ffe/siteui/vlv3/f841d4c7-10e1-40af-bca1-07e3f8eb14b4/netflix-background.jpg');
            background-size: cover;
            background-position: center;
            color: white; 
            display: flex; 
            align-items: center; 
            height: 100vh; 
            font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif;
        }
        .login-card { 
            background: rgba(0, 0, 0, 0.85); 
            padding: 60px; 
            border-radius: 8px; 
            width: 100%; 
            max-width: 450px; 
            margin: auto; 
        }
        .btn-netflix { 
            background: #e50914; 
            color: white; 
            font-weight: bold; 
            padding: 12px;
            font-size: 1.1rem;
            border: none;
            margin-top: 20px;
        }
        .btn-netflix:hover {
            background: #bf0810;
            color: white;
        }
        .form-control {
            background: #333;
            border: none;
            color: white;
            padding: 12px;
            margin-bottom: 15px;
        }
        .form-control:focus {
            background: #454545;
            color: white;
            box-shadow: none;
        }
        .footer-links a {
            color: #b3b3b3;
            text-decoration: none;
            font-size: 0.9rem;
        }
        .footer-links a:hover {
            text-decoration: underline;
        }
    </style>
</head>
<body>

    <div class="login-card shadow-lg">
        <h1 class="mb-4 fw-bold">Sign In</h1>
        
        <form action="/login" method="post">
            <div class="mb-3">
                <input type="text" name="username" class="form-control" placeholder="Employee ID" required>
            </div>
            <div class="mb-3">
                <input type="password" name="password" class="form-control" placeholder="Password" required>
            </div>
            <button type="submit" class="btn btn-netflix w-100">Sign In</button>
        </form>

        <div class="footer-links mt-4">
            <div class="d-flex justify-content-between">
                <div>
                    <span style="color: #737373;">New here?</span> 
                    <a href="/signup_page" style="color: white;">Register now.</a>
                </div>
            </div>
            <div class="mt-3">
                <a href="/forgot_password">Forgot password?</a>
            </div>
        </div>
    </div>

</body>
</html>
