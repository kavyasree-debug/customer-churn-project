<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kavya's Churn Predictor</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background-color: #f0f2f5; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
        .hero-section { background: linear-gradient(135deg, #0062E6, #33AEFF); color: white; padding: 60px 0; margin-bottom: 40px; border-bottom: 5px solid #004fb1; }
        .card { border: none; border-radius: 15px; }
        .btn-primary { background-color: #0062E6; border: none; padding: 12px; font-weight: bold; border-radius: 8px; }
        .btn-primary:hover { background-color: #004fb1; }
    </style>
</head>
<body>

    <div class="hero-section text-center">
        <div class="container">
            <h1 class="display-4 fw-bold">Customer Churn Prediction System</h1>
            <p class="lead">Upload your telecom/retail dataset to identify at-risk customers instantly.</p>
        </div>
    </div>

    <div class="container">
        <div class="row justify-content-center">
            <div class="col-md-6">
                <div class="card shadow-lg p-4">
                    <h3 class="text-center mb-4">Upload Dataset (.csv)</h3>
                    
                    <form action="/predict" method="post" enctype="multipart/form-data">
                        <div class="mb-4">
                            <label for="file" class="form-label fw-semibold">Select Customer Data File:</label>
                            <input type="file" name="file" id="file" class="form-control" accept=".csv" required>
                            <div class="form-text">Please ensure your CSV includes 'MonthlyCharges' and 'Tenure'.</div>
                        </div>
                        
                        <button type="submit" class="btn btn-primary w-100 shadow-sm">
                            🚀 Start Prediction Analysis
                        </button>
                    </form>
                </div>
                <div class="mt-4 text-center text-muted">
                    <small>Minor Project: Automated Business Reporting System © 2026</small>
                </div>
            </div>
        </div>
    </div>

</body>
</html>
